<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deer's Interaction | 立体振翅动线 V17.4</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #010204;
            font-family: 'Montserrat', sans-serif;
        }

        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            pointer-events: none;
        }

        #controls {
            position: absolute;
            top: 30px;
            left: 30px;
            pointer-events: auto;
            display: flex;
            gap: 20px;
        }

        .btn {
            background: linear-gradient(135deg, rgba(180, 20, 40, 0.6), rgba(120, 10, 20, 0.6));
            border: 1px solid rgba(255, 215, 0, 0.4);
            color: #ffebcd;
            padding: 12px 30px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 12px;
            letter-spacing: 2px;
            text-transform: uppercase;
            backdrop-filter: blur(10px);
            border-radius: 30px;
            box-shadow: 0 0 15px rgba(220, 20, 60, 0.3);
        }

        .btn:hover {
            background: rgba(220, 40, 60, 0.8);
            border-color: #fff;
            color: #fff;
            box-shadow: 0 0 35px rgba(255, 215, 0, 0.5);
            transform: translateY(-2px);
        }

        #status-hud {
            position: absolute;
            bottom: 50px;
            width: 100%;
            text-align: center;
            color: #ffebcd;
            font-weight: 300;
            transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
            text-shadow: 0 0 15px rgba(255, 215, 0, 0.4);
        }

        #status-text {
            font-size: 14px;
            letter-spacing: 4px;
            text-transform: uppercase;
            font-weight: 600;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 0.8;
                transform: scale(1);
            }

            50% {
                opacity: 1;
                transform: scale(1.1);
            }
        }

        .gallery-nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            font-size: 50px;
            color: rgba(255, 255, 255, 0.2);
            cursor: pointer;
            pointer-events: auto;
            padding: 30px;
            opacity: 0;
            transition: all 0.3s ease;
            pointer-events: none;
        }

        #nav-left {
            left: 10px;
        }

        #nav-right {
            right: 10px;
        }

        .gallery-nav.charging {
            color: #ffaa00;
            opacity: 0.8;
            text-shadow: 0 0 15px #ffaa00;
            transform: translateY(-50%) scale(1.1);
            transition: all 0.2s ease;
        }

        .gallery-nav.active {
            color: #fff;
            opacity: 1;
            text-shadow: 0 0 30px #fff;
            transform: translateY(-50%) scale(1.5);
            transition: all 0.1s ease;
        }

        body.gallery-mode .gallery-nav {
            opacity: 0.3;
            pointer-events: auto;
        }

        body.gallery-mode #status-hud {
            bottom: 120px;
            opacity: 0.6;
            transform: scale(0.9);
        }

        #file-input,
        video {
            display: none;
        }

        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&display=swap');
    </style>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }
    </script>
</head>

<body>

    <div id="canvas-container"></div>
    <video id="input-video" playsinline></video>

    <div id="ui-layer">
        <div id="controls">
            <button class="btn" onclick="document.getElementById('file-input').click()">🎁 Upload Memories</button>
            <button class="btn" onclick="app.toggleCamera()">👌 Enable Hands</button>
            <button class="btn" onclick="app.toggleFullscreen()">⛶ Fullscreen</button>
        </div>
        <input type="file" id="file-input" multiple accept="image/*">
        <div id="nav-left" class="gallery-nav" onclick="app.navigateGallery(-1)">❮</div>
        <div id="nav-right" class="gallery-nav" onclick="app.navigateGallery(1)">❯</div>
        <div id="status-hud">
            <span id="status-text">Merry Christmas Ms.Li</span>
        </div>
        <audio id="bgm" src="assets/jingle-bells-445113.mp3" loop preload="auto"></audio>
    </div>



    <script type="module">
        import * as THREE from 'three';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        const CONFIG = {
            colors: {
                bg: 0x0a0505,
                fog: 0x1a0f0f,
                emerald: 0x208c50,
                cyan: 0x2d5a40,
                warmGold: 0xffb347,
                rubyRed: 0x800020,
                starlight: 0xffeebb,
                deerBlue: 0xffd1a3,
                deerFlow: 0xffffff,
                // 【核心修改】2025 定制高定配色池（自然光谱排序版）
                giftPalette: [
                    // --- 🔥 第一章：余温 (Warmth & Earth) ---
                    // 1. 复古丝绒红 + 亮金 (经典开场，奠定红色基调)
                    { body: 0x680F24, ribbon: 0xFFD700 },
                    // 2. 黑巧 + 马卡龙甜橙 (红转棕橙，温暖的过渡)
                    { body: 0x3E2723, ribbon: 0xFFB74D },

                    // --- 🌲 第二章：森境 (Forest & Mist) ---
                    // 3. 墨绿 + 古铜 (进入深邃森林)
                    { body: 0x1A2F23, ribbon: 0xC5A059 },
                    // 4. 极光孔雀 + 玫瑰金 (绿中带蓝，开始变得冷艳)
                    { body: 0x004040, ribbon: 0xE6C288 },
                    // 5. 迷雾森林 + 奶油黄 (灰绿调，像晨雾一样柔和的过渡)
                    { body: 0x2F4F4F, ribbon: 0xFFFDD0 },

                    // --- 🌊 第三章：深洋 (Ocean & Ice) ---
                    // 6. 钢灰蓝 + 粉蓝 (迷雾散去，显露出的冷灰蓝)
                    { body: 0x334E68, ribbon: 0xB0E0E6 },
                    // 7. 深海蓝 + 冰晶白 (纯粹的冷色调，冰雪魔法)
                    { body: 0x102A43, ribbon: 0xE0FFFF },
                    // 8. 皇家蓝 + 柠檬黄 (最深的蓝，用黄色丝带强对比，像梵高的星空)
                    { body: 0x141E30, ribbon: 0xFDD835 },

                    // --- 🔮 第四章：秘境 (Mystery) ---
                    // 9. 夜茄紫 + 沙金 (蓝转紫，神秘收尾，紫色又能自然衔接回第一项的红色)
                    { body: 0x2E1A47, ribbon: 0xF4A460 },
                ]
            },
            needleCount: 15000,
            snowCount: 4000,
            treeHeight: 34,
            treeBaseRadius: 11,
            butterflyCount: 45,
            // 小鹿位置：尽量靠近画面中心，同时远离礼盒环形分布区以减少“挤箱子”
            deerPos: { x: 0, z: 4 }
        };
        const STATE = { TREE: 'tree', GALLERY: 'gallery' };

        class DeerAppV16 {
            constructor() {
                this.currentState = STATE.TREE;
                this.cameraActive = false;
                this.time = 0;
                this._lastFrameTime = performance.now();
                this.giftBoxes = [];
                this.galleryIndex = 0;
                this.goldenAngle = Math.PI * (3 - Math.sqrt(5));
                this.hasUploadedRealPhoto = false;
                this.keysDown = new Set();
                this.userMovedCamera = false;

                this.lastToggleTime = 0;
                this.toggleCooldown = 1500;
                this.hoveringEdge = null;
                this.currentCharge = 0;
                this.isNavigating = false;
                this.cursorSmoothPos = new THREE.Vector3();

                this.init();
            }

            toggleFullscreen() {
                const doc = document;
                const root = doc.documentElement;
                const isFullscreen = doc.fullscreenElement || doc.webkitFullscreenElement;

                if (!isFullscreen) {
                    (root.requestFullscreen || root.webkitRequestFullscreen)?.call(root);
                } else {
                    (doc.exitFullscreen || doc.webkitExitFullscreen)?.call(doc);
                }
            }

            init() {
                this.setupScene();
                this.createDivineStag();
                this.createLittleDog();
                this.createBrightTree();
                this.createButterflies();
                // this.createCrystalGalaxy(); // 解除封印：点击 starCore
                // this.createSimpleStar(); // 经典 2D 五角星
                this.createParticleStar(); // 粒子星：点击爆散并定格
                this.createChargeCursor();
                this.addDefaultGifts();
                this.setupInputs();
                this.setupGalleryControls();
                this.setupStarInteraction();
                this.setupBGM();
                this.animate();
            }

            setupScene() {
                this.scene = new THREE.Scene();
                this.scene.background = new THREE.Color(CONFIG.colors.bg);
                this.scene.fog = new THREE.FogExp2(CONFIG.colors.fog, 0.012);

                this.camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 300);
                this.camera.position.set(0, 10, 55);

                this.renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
                this.renderer.setSize(window.innerWidth, window.innerHeight);
                this.renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));
                this.renderer.toneMapping = THREE.ACESFilmicToneMapping;
                this.renderer.toneMappingExposure = 1.0;
                document.getElementById('canvas-container').appendChild(this.renderer.domElement);

                this.composer = new EffectComposer(this.renderer);
                this.composer.addPass(new RenderPass(this.scene, this.camera));
                const bloom = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.5, 0.4, 0.85);
                bloom.threshold = 0.2; bloom.strength = 0.7; bloom.radius = 0.9;
                this.composer.addPass(bloom);

                this.controls = new OrbitControls(this.camera, this.renderer.domElement);
                this.controls.enableDamping = true;
                this.controls.autoRotate = true;
                this.controls.autoRotateSpeed = 0.3;
                this.controls.enablePan = false;
                this.controls.minPolarAngle = Math.PI * 0.3;
                this.controls.maxPolarAngle = Math.PI * 0.65;

                const ambientLight = new THREE.AmbientLight(0x223344, 1.5);
                this.scene.add(ambientLight);
                const treeInnerLight = new THREE.PointLight(CONFIG.colors.warmGold, 1.8, 80);
                treeInnerLight.position.set(0, 15, 0);
                this.scene.add(treeInnerLight);

                const bottomFillLight = new THREE.PointLight(0xffaa00, 1.2, 60);
                bottomFillLight.position.set(0, -5, 15);
                this.scene.add(bottomFillLight);

                this.deerLight = new THREE.PointLight(CONFIG.colors.deerBlue, 1.5, 30);
                this.scene.add(this.deerLight);
            }

            createChargeCursor() {
                const geo = new THREE.RingGeometry(0.25, 0.3, 32);
                const mat = new THREE.MeshBasicMaterial({
                    color: 0xffffff,
                    transparent: true,
                    opacity: 0.8,
                    side: THREE.DoubleSide,
                    depthTest: false,
                    depthWrite: false
                });
                this.cursor = new THREE.Mesh(geo, mat);

                const chargeGeo = new THREE.RingGeometry(0.35, 0.45, 32);
                const chargeMat = new THREE.MeshBasicMaterial({
                    color: CONFIG.colors.warmGold,
                    transparent: true,
                    opacity: 0.0,
                    side: THREE.DoubleSide,
                    depthTest: false,
                    depthWrite: false
                });
                this.chargeRing = new THREE.Mesh(chargeGeo, chargeMat);

                this.chargeRing.scale.set(0.1, 0.1, 1);
                this.cursor.add(this.chargeRing);

                this.cursor.renderOrder = 999;
                this.chargeRing.renderOrder = 999;
                this.cursor.visible = false;
                this.cursor.add(new THREE.PointLight(CONFIG.colors.starlight, 1.5, 10));
                this.scene.add(this.cursor);
            }

            createCrystalGalaxy() {
                this.galaxyGroup = new THREE.Group();
                this.galaxyActive = false;

                // 1. 水晶球 (The Crystal Orb)
                const sphereGeo = new THREE.SphereGeometry(2.5, 64, 64);
                const sphereMat = new THREE.MeshPhysicalMaterial({
                    transmission: 1.0,
                    thickness: 1.5,
                    roughness: 0.0,
                    ior: 1.5,
                    color: 0xffffff,
                    attenuationColor: 0xffffff,
                    attenuationDistance: 5.0,
                    side: THREE.BackSide // Render backface to see inside clearly
                });
                // Front side for reflection
                const sphereMatFront = new THREE.MeshPhysicalMaterial({
                    transmission: 1.0,
                    thickness: 1.5,
                    roughness: 0.0,
                    ior: 1.5,
                    side: THREE.FrontSide
                });

                this.crystalBall = new THREE.Mesh(sphereGeo, sphereMatFront);
                // Add an inner sphere for backface refraction effects
                const innerBall = new THREE.Mesh(sphereGeo, sphereMat);
                this.crystalBall.add(innerBall);

                this.galaxyGroup.add(this.crystalBall);

                // 2. 镂空五角星 (The Hollow Glyph)
                const shape = new THREE.Shape();
                const outerR = 1.2;
                const innerR = 0.5;
                const holeOuterR = 0.9;
                const holeInnerR = 0.4;

                const drawStar = (s, r1, r2) => {
                    const points = 5;
                    const step = Math.PI / points;
                    let angle = -Math.PI / 2;
                    for (let i = 0; i < points * 2; i++) {
                        const r = (i % 2 === 0) ? r1 : r2;
                        const x = Math.cos(angle) * r;
                        const y = -(Math.sin(angle) * r);
                        if (i === 0) s.moveTo(x, y);
                        else s.lineTo(x, y);
                        angle += step;
                    }
                    s.closePath();
                };

                drawStar(shape, outerR, innerR);

                const holePath = new THREE.Path();
                drawStar(holePath, holeOuterR, holeInnerR);
                shape.holes.push(holePath);

                const extrudeSettings = {
                    steps: 1,
                    depth: 0.1,
                    bevelEnabled: true,
                    bevelThickness: 0.02,
                    bevelSize: 0.02,
                    bevelSegments: 3
                };

                const starGeo = new THREE.ExtrudeGeometry(shape, extrudeSettings);
                starGeo.center();
                const starMat = new THREE.MeshStandardMaterial({
                    color: 0xFFD700,
                    roughness: 0.1,
                    metalness: 1.0,
                    emissive: 0xFFD700,
                    emissiveIntensity: 1.5
                });
                this.hollowStar = new THREE.Mesh(starGeo, starMat);
                this.galaxyGroup.add(this.hollowStar);

                // 3. 核心多面体 (The Core)
                const coreGeo = new THREE.IcosahedronGeometry(0.35, 0);
                const coreMat = new THREE.MeshBasicMaterial({
                    color: 0xffffff,
                    wireframe: true
                });
                this.starCore = new THREE.Mesh(coreGeo, coreMat);
                const innerCore = new THREE.Mesh(
                    new THREE.SphereGeometry(0.15, 16, 16),
                    new THREE.MeshBasicMaterial({ color: 0x00ffff })
                );
                this.starCore.add(innerCore);
                this.galaxyGroup.add(this.starCore);

                // 4. 星尘粒子 (The Stardust)
                const pCount = 2000;
                const pGeo = new THREE.BufferGeometry();
                const pPos = new Float32Array(pCount * 3);
                const pSizes = new Float32Array(pCount);
                const pHome = [];

                for (let i = 0; i < pCount; i++) {
                    // Start at center
                    pPos[i * 3] = (Math.random() - 0.5) * 0.1;
                    pPos[i * 3 + 1] = (Math.random() - 0.5) * 0.1;
                    pPos[i * 3 + 2] = (Math.random() - 0.5) * 0.1;
                    pSizes[i] = Math.random();

                    // Random spherical target
                    const r = 2.2 * Math.cbrt(Math.random());
                    const theta = Math.random() * Math.PI * 2;
                    const phi = Math.acos(2 * Math.random() - 1);
                    pHome.push(new THREE.Vector3(
                        r * Math.sin(phi) * Math.cos(theta),
                        r * Math.sin(phi) * Math.sin(theta),
                        r * Math.cos(phi)
                    ));
                }

                pGeo.setAttribute('position', new THREE.BufferAttribute(pPos, 3));
                pGeo.setAttribute('size', new THREE.BufferAttribute(pSizes, 1));

                if (!this.stardustTexture) {
                    const canvas = document.createElement('canvas');
                    canvas.width = 32; canvas.height = 32;
                    const ctx = canvas.getContext('2d');
                    const grad = ctx.createRadialGradient(16, 16, 0, 16, 16, 16);
                    grad.addColorStop(0, 'rgba(255,255,255,1)');
                    grad.addColorStop(1, 'rgba(0,0,0,0)');
                    ctx.fillStyle = grad; ctx.fillRect(0, 0, 32, 32);
                    this.stardustTexture = new THREE.CanvasTexture(canvas);
                }

                const pMat = new THREE.PointsMaterial({
                    color: 0x88ccff,
                    size: 0.1,
                    map: this.stardustTexture,
                    transparent: true,
                    opacity: 0.0,
                    blending: THREE.AdditiveBlending,
                    depthWrite: false
                });
                this.stardust = new THREE.Points(pGeo, pMat);
                this.stardust.userData = { homes: pHome };
                this.galaxyGroup.add(this.stardust);

                this.galaxyGroup.position.set(0, CONFIG.treeHeight / 2 + 2.0, 0);
                this.scene.add(this.galaxyGroup);

                // Setup Interaction
                this.raycaster = new THREE.Raycaster();
                this.mouse = new THREE.Vector2(0, 0); // Default center
                this.isMouseMoving = false;

                window.addEventListener('click', (event) => {
                    if (this.currentState !== STATE.TREE) return;
                    if (!this.starCore || this.galaxyActive) return;
                    this.mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
                    this.mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
                    this.raycaster.setFromCamera(this.mouse, this.camera);

                    const intersects = this.raycaster.intersectObject(this.starCore, true);
                    if (intersects.length > 0) {
                        this.activateGalaxy();
                        document.body.style.cursor = 'default';
                    }
                });

                window.addEventListener('mousemove', (event) => {
                    this.mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
                    this.mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
                    this.isMouseMoving = true;

                    if (this.currentState !== STATE.TREE || !this.starCore) return;
                    if (this.galaxyActive) {
                        document.body.style.cursor = 'default';
                        return;
                    }

                    this.raycaster.setFromCamera(this.mouse, this.camera);
                    const intersects = this.raycaster.intersectObject(this.starCore, true);
                    if (intersects.length > 0) {
                        document.body.style.cursor = 'pointer';
                        gsap.to(this.starCore.scale, { x: 1.2, y: 1.2, z: 1.2, duration: 0.3, overwrite: "auto" });
                    } else {
                        document.body.style.cursor = 'default';
                        gsap.to(this.starCore.scale, { x: 1.0, y: 1.0, z: 1.0, duration: 0.3, overwrite: "auto" });
                    }
                });
            }

            createSimpleStar() {
                const starShape = new THREE.Shape();
                const points = 5;
                const outerRadius = 1.5;
                const innerRadius = 0.6;

                for (let i = 0; i < points * 2; i++) {
                    const angle = (i / (points * 2)) * Math.PI * 2 + Math.PI / 2;
                    const r = (i % 2 === 0) ? outerRadius : innerRadius;
                    const x = Math.cos(angle) * r;
                    const y = Math.sin(angle) * r;
                    if (i === 0) starShape.moveTo(x, y);
                    else starShape.lineTo(x, y);
                }
                starShape.closePath();

                const geometry = new THREE.ShapeGeometry(starShape);
                const material = new THREE.MeshStandardMaterial({
                    color: 0xffd700,
                    emissive: 0xffaa00,
                    emissiveIntensity: 0.8,
                    roughness: 0.2,
                    metalness: 0.8,
                    side: THREE.DoubleSide
                });

                this.simpleStar = new THREE.Mesh(geometry, material);
                this.simpleStar.scale.set(1, 1, 1);

                const light = new THREE.PointLight(0xffaa00, 2.0, 40);
                light.position.set(0, 0, 1);
                this.simpleStar.add(light);

                this.simpleStar.position.set(0, CONFIG.treeHeight / 2 + 1.2, 0);
                this.scene.add(this.simpleStar);
            }

            createParticleStar() {
                this.particleStarGroup = new THREE.Group();
                this.starState = { progress: 0 };

                const particleCount = 5200;
                const geometry = new THREE.BufferGeometry();
                const positions = new Float32Array(particleCount * 3);
                const sizes = new Float32Array(particleCount);
                const colors = new Float32Array(particleCount * 3);

                const initialPositions = new Float32Array(particleCount * 3);
                const targetPositions = new Float32Array(particleCount * 3);

                if (!this.starParticleTexture) {
                    const canvas = document.createElement('canvas');
                    canvas.width = 32; canvas.height = 32;
                    const ctx = canvas.getContext('2d');
                    const grad = ctx.createRadialGradient(16, 16, 0, 16, 16, 16);
                    grad.addColorStop(0, 'rgba(255, 255, 255, 1)');
                    grad.addColorStop(0.2, 'rgba(255, 215, 0, 0.9)');
                    grad.addColorStop(0.5, 'rgba(255, 140, 0, 0.3)');
                    grad.addColorStop(1, 'rgba(0, 0, 0, 0)');
                    ctx.fillStyle = grad;
                    ctx.fillRect(0, 0, 32, 32);
                    this.starParticleTexture = new THREE.CanvasTexture(canvas);
                    this.starParticleTexture.colorSpace = THREE.SRGBColorSpace;
                }

                const starPoints = 5;
                const outerR = 2.2;
                const innerR = 0.9;
                const thickness = 0.8;

                const gold = new THREE.Color(0xffd700);
                const white = new THREE.Color(0xffffff);
                const step = (Math.PI * 2) / starPoints;
                const halfStep = step / 2;

                let count = 0;
                let attempts = 0;
                while (count < particleCount) {
                    attempts++;
                    if (attempts > particleCount * 200) break;

                    const angle = Math.random() * Math.PI * 2;
                    const rRandom = Math.sqrt(Math.random()) * outerR;

                    const sector = Math.floor(angle / step);
                    const centerAngle = sector * step + halfStep;
                    const angleDiff = Math.abs(angle - centerAngle);
                    const maxR = innerR + (outerR - innerR) * (1 - angleDiff / halfStep);

                    if (rRandom < maxR) {
                        const x = Math.cos(angle) * rRandom;
                        const y = Math.sin(angle) * rRandom;
                        const z = (Math.random() - 0.5) * thickness * (1 - rRandom / outerR);

                        const i3 = count * 3;
                        positions[i3] = x;
                        positions[i3 + 1] = y;
                        positions[i3 + 2] = z;

                        initialPositions[i3] = x;
                        initialPositions[i3 + 1] = y;
                        initialPositions[i3 + 2] = z;

                        const explodeR = 10.0 + Math.random() * 15.0;
                        const theta = Math.random() * Math.PI * 2;
                        const phi = Math.acos(2 * Math.random() - 1);
                        targetPositions[i3] = explodeR * Math.sin(phi) * Math.cos(theta);
                        targetPositions[i3 + 1] = explodeR * Math.sin(phi) * Math.sin(theta);
                        targetPositions[i3 + 2] = explodeR * Math.cos(phi);

                        const baseSize = 0.15 + (1 - rRandom / outerR) * 0.1;
                        sizes[count] = baseSize + Math.random() * 0.1;

                        const c = (Math.random() < 0.2) ? white : gold;
                        colors[i3] = c.r;
                        colors[i3 + 1] = c.g;
                        colors[i3 + 2] = c.b;

                        count++;
                    }
                }

                geometry.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
                geometry.setAttribute('size', new THREE.Float32BufferAttribute(sizes, 1));
                geometry.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));
                geometry.userData = {
                    initialPos: initialPositions,
                    targetPos: targetPositions,
                    basePos: initialPositions.slice(),
                    baseColor: colors.slice()
                };

                const material = new THREE.PointsMaterial({
                    size: 0.38,
                    vertexColors: true,
                    map: this.starParticleTexture,
                    transparent: true,
                    opacity: 0.65,
                    blending: THREE.AdditiveBlending,
                    depthTest: false,
                    depthWrite: false,
                    sizeAttenuation: true
                });

                this.starPoints = new THREE.Points(geometry, material);
                this.starPoints.renderOrder = 2;
                this.particleStarGroup.add(this.starPoints);

                // --- Click-avoid + trails (short-lived) ---
                this.starParticleMotion = {
                    off: new Float32Array(particleCount * 3),
                    vel: new Float32Array(particleCount * 3)
                };
                this.starTrailStrength = 0;
                this.starTrailOpacities = [0.85, 0.55, 0.35];
                this.starTrailHistory = [
                    positions.slice(),
                    positions.slice(),
                    positions.slice(),
                    positions.slice()
                ];
                this.starTrails = this.starTrailOpacities.map((baseOpacity, idx) => {
                    const trailGeom = new THREE.BufferGeometry();
                    const trailPos = positions.slice();
                    const trailCol = colors.slice();
                    for (let i = 0; i < trailCol.length; i++) trailCol[i] *= 0.8;

                    trailGeom.setAttribute('position', new THREE.Float32BufferAttribute(trailPos, 3));
                    trailGeom.setAttribute('color', new THREE.Float32BufferAttribute(trailCol, 3));

                    const trailMat = new THREE.PointsMaterial({
                        size: 1.25 + idx * 0.18,
                        vertexColors: true,
                        map: this.starParticleTexture,
                        transparent: true,
                        opacity: 0,
                        blending: THREE.AdditiveBlending,
                        depthTest: false,
                        depthWrite: false,
                        sizeAttenuation: true
                    });

                    const pts = new THREE.Points(trailGeom, trailMat);
                    pts.renderOrder = 1;
                    this.particleStarGroup.add(pts);
                    return pts;
                });

                const hitGeo = new THREE.SphereGeometry(2.8, 16, 16);
                const hitMat = new THREE.MeshBasicMaterial({ visible: false });
                this.starHitBox = new THREE.Mesh(hitGeo, hitMat);
                this.particleStarGroup.add(this.starHitBox);

                const light = new THREE.PointLight(0xffd700, 0.6, 55);
                this.starLight = light;
                this.particleStarGroup.add(light);

                this.particleStarGroup.position.set(0, CONFIG.treeHeight / 2 + 1.8, 0);
                // 让五角星尖朝上
                this.particleStarGroup.rotation.z = Math.PI * 3 / 10;
                this.scene.add(this.particleStarGroup);
            }

            activateGalaxy() {
                if (this.galaxyActive) return;
                this.galaxyActive = true;

                // Explode Star
                gsap.to(this.hollowStar.scale, { x: 5, y: 5, z: 5, duration: 0.6, ease: "power2.in" });
                gsap.to(this.hollowStar.material, { opacity: 0, transparent: true, duration: 0.6, onComplete: () => this.hollowStar.visible = false });

                // Spin Core
                gsap.to(this.starCore.scale, { x: 0.5, y: 0.5, z: 0.5, duration: 0.5, ease: "back.out(2)" });

                // Show Particles
                gsap.to(this.stardust.material, { opacity: 0.9, duration: 1.0 });

                // Scatter Particles
                const pPos = this.stardust.geometry.attributes.position;
                const homes = this.stardust.userData.homes;
                const tempObj = { t: 0 };

                gsap.to(tempObj, {
                    t: 1,
                    duration: 2.0,
                    ease: "expo.out",
                    onUpdate: () => {
                        for (let i = 0; i < homes.length; i++) {
                            const tx = homes[i].x * tempObj.t;
                            const ty = homes[i].y * tempObj.t;
                            const tz = homes[i].z * tempObj.t;
                            pPos.setXYZ(i, tx, ty, tz);
                        }
                        pPos.needsUpdate = true;
                    }
                });
            }


            getTreePos(h, angleIdx, noiseStrength) {
                const yAdjustment = Math.pow(h, 2) * 0.2;
                const y = h * CONFIG.treeHeight - CONFIG.treeHeight / 2 - yAdjustment;
                const baseRadius = CONFIG.treeBaseRadius * Math.pow((1 - h), 1.2);
                const layerFreq = 9;
                const rawWave = Math.sin(h * layerFreq * Math.PI * 2 - Math.PI / 4);
                const layerBulge = Math.max(0, rawWave);
                const layerStickOut = layerBulge * 3.5 * (1 - h);
                const angle = angleIdx * this.goldenAngle;
                const starShape = Math.cos(angle * 7 + h * 20);
                const radialFactor = 1 + starShape * 0.2;
                let radius = (baseRadius + layerStickOut) * radialFactor;
                radius += (Math.random() - 0.5) * noiseStrength * 0.8;
                radius = Math.max(0.2, radius);
                return new THREE.Vector3(radius * Math.cos(angle), y, radius * Math.sin(angle));
            }

            // --- 蝴蝶系统 V17.4：立体几何 + V型振翅 ---
            createButterflies() {
                const count = CONFIG.butterflyCount;

                // 1. 绘制精致轮廓
                const shape = new THREE.Shape();
                shape.moveTo(0, 0);
                // 右翼
                shape.bezierCurveTo(0.2, 0.2, 0.8, 0.8, 1.2, 0.4);
                shape.bezierCurveTo(1.6, 0.0, 1.4, -0.2, 1.0, -0.4);
                shape.bezierCurveTo(1.2, -0.8, 0.8, -1.6, 0.4, -1.2);
                shape.bezierCurveTo(0.2, -1.0, 0.1, -0.5, 0, 0);
                // 左翼
                shape.bezierCurveTo(-0.1, -0.5, -0.2, -1.0, -0.4, -1.2);
                shape.bezierCurveTo(-0.8, -1.6, -1.2, -0.8, -1.0, -0.4);
                shape.bezierCurveTo(-1.4, -0.2, -1.6, 0.0, -1.2, 0.4);
                shape.bezierCurveTo(-0.8, 0.8, -0.2, 0.2, 0, 0);

                const geometry = new THREE.ShapeGeometry(shape, 4);

                // [核心修改] 遍历顶点，构建 "V" 字形上扬角度 (Dihedral)
                // 这样当 X 轴缩放时，看起来就是翅膀在扑动，而不是变窄
                const posAttribute = geometry.attributes.position;
                const vertex = new THREE.Vector3();
                const axisY = new THREE.Vector3(0, 1, 0);
                const bendAngle = Math.PI / 6; // 30度上扬

                for (let i = 0; i < posAttribute.count; i++) {
                    vertex.fromBufferAttribute(posAttribute, i);

                    // 根据 x 坐标判断是左翼还是右翼
                    if (vertex.x > 0.01) {
                        // 右翼：绕 Y 轴旋转 +30 度 (向后/向上弯折)
                        vertex.applyAxisAngle(axisY, bendAngle);
                    } else if (vertex.x < -0.01) {
                        // 左翼：绕 Y 轴旋转 -30 度
                        vertex.applyAxisAngle(axisY, -bendAngle);
                    }
                    // 中线保持不变

                    posAttribute.setXYZ(i, vertex.x, vertex.y, vertex.z);
                }
                geometry.computeVertexNormals(); // 重新计算光照法线

                const mat = new THREE.MeshBasicMaterial({
                    color: 0xffffff,
                    side: THREE.DoubleSide,
                    transparent: true,
                    opacity: 0.95
                });

                this.butterflyMesh = new THREE.InstancedMesh(geometry, mat, count);
                this.butterflyData = [];

                const colorBlue = new THREE.Color(0xaaccff);
                const colorPurple = new THREE.Color(0xcfaaff);
                const colorGold = new THREE.Color(0xffeebb);
                const dummyColor = new THREE.Color();

                for (let i = 0; i < count; i++) {
                    this.butterflyData.push({
                        lagOffset: i * 0.015,
                        noiseOffset: {
                            x: Math.random() * 100,
                            y: Math.random() * 100,
                            z: Math.random() * 100
                        },
                        flapSpeed: 5 + Math.random() * 5,
                        size: 0.25 + Math.random() * 0.25
                    });

                    const progress = i / count;
                    if (progress < 0.3) dummyColor.copy(colorGold);
                    else if (progress < 0.7) dummyColor.copy(colorPurple);
                    else dummyColor.copy(colorBlue);

                    dummyColor.multiplyScalar(1.2);
                    this.butterflyMesh.setColorAt(i, dummyColor);
                }

                this.butterflyMesh.instanceColor.needsUpdate = true;
                this.scene.add(this.butterflyMesh);
            }

            updateButterflies() {
                if (!this.butterflyMesh) return;

                const dummy = new THREE.Object3D();
                const currentPos = new THREE.Vector3();
                const nextPos = new THREE.Vector3();

                const swarmSpeed = 0.015;
                const globalTime = this.time * swarmSpeed;

                const getButterflyPos = (t, data, outVec) => {
                    let pathProgress = (t - data.lagOffset) % 1.0;
                    if (pathProgress < 0) pathProgress += 1.0;

                    const baseH = pathProgress;
                    const baseAngle = baseH * Math.PI * 12;
                    const treeRadius = 13 * Math.pow((1.1 - baseH), 1.2);

                    const trackX = Math.cos(baseAngle) * treeRadius;
                    const trackZ = Math.sin(baseAngle) * treeRadius;
                    const trackY = baseH * CONFIG.treeHeight - CONFIG.treeHeight / 2;

                    const timeScale = this.time * 0.4;
                    const noiseX = Math.sin(timeScale + data.noiseOffset.x) * 1.5;
                    const noiseY = Math.cos(timeScale * 0.8 + data.noiseOffset.y) * 1.0;
                    const noiseZ = Math.sin(timeScale * 1.2 + data.noiseOffset.z) * 1.5;

                    outVec.set(
                        trackX + noiseX,
                        trackY + noiseY,
                        trackZ + noiseZ
                    );
                    return baseH;
                };

                for (let i = 0; i < CONFIG.butterflyCount; i++) {
                    const data = this.butterflyData[i];

                    const baseH = getButterflyPos(globalTime, data, currentPos);
                    getButterflyPos(globalTime + 0.005, data, nextPos);

                    dummy.position.copy(currentPos);

                    dummy.lookAt(nextPos);

                    // 修正朝向：从 Z 轴转到 Y 轴，让头顶着飞
                    dummy.rotateX(Math.PI / 2);
                    // 侧倾
                    dummy.rotateY(Math.sin(this.time * 2 + i) * 0.1);

                    // 翅膀扇动
                    const flap = Math.sin(this.time * data.flapSpeed);
                    const flapScale = THREE.MathUtils.mapLinear(flap, -1, 1, 0.3, 1.0);

                    const lifeFade = 1.0 - Math.pow(Math.max(0, baseH - 0.9) * 10, 2);
                    const finalSize = data.size * Math.max(0, lifeFade);

                    // [视觉技巧]
                    // 这里的 scale.x 现在控制的是 V 型翅膀的开合程度
                    // 当 x 变小时，因为几何体本身是弯曲的，翅膀尖端会靠拢，形成完美的扑动
                    dummy.scale.set(finalSize * flapScale, finalSize, finalSize);

                    dummy.updateMatrix();
                    this.butterflyMesh.setMatrixAt(i, dummy.matrix);
                }
                this.butterflyMesh.instanceMatrix.needsUpdate = true;
            }

            addDefaultGifts() { const e = CONFIG.colors.giftPalette; for (let t = 0; t < 8; t++)this.createGiftBox(null, e[t % e.length], t, !0) }

            // --- 礼物盒系统 V37.1：【净澈水晶版 · 去除表面噪点】 ---
            createGiftBox(imgTexture, colorHex, idx, isDefault = false) {
                const group = new THREE.Group();

                // 1. 颜色配置
                let bodyColor = new THREE.Color();
                let ribbonColor = new THREE.Color();

                const palette = CONFIG.colors.giftPalette[idx % CONFIG.colors.giftPalette.length];
                if (typeof palette === 'object' && palette.body) {
                    bodyColor.set(palette.body);
                    ribbonColor.set(palette.ribbon).multiplyScalar(1.2);
                } else if (palette) {
                    bodyColor.set(palette);
                    ribbonColor.setHex(0xFFD700);
                } else {
                    bodyColor.setHex(colorHex || 0x222222);
                    ribbonColor.setHex(0xFFD700);
                }

                if (!this.particleTexture) {
                    const canvas = document.createElement('canvas');
                    canvas.width = 64; canvas.height = 64;
                    const ctx = canvas.getContext('2d');
                    const grad = ctx.createRadialGradient(32, 32, 0, 32, 32, 32);
                    grad.addColorStop(0, 'rgba(255, 255, 255, 1)');
                    grad.addColorStop(0.4, 'rgba(255, 255, 255, 0.6)');
                    grad.addColorStop(1, 'rgba(0, 0, 0, 0)');
                    ctx.fillStyle = grad;
                    ctx.fillRect(0, 0, 64, 64);
                    this.particleTexture = new THREE.CanvasTexture(canvas);
                }

                const getParticleMat = (color, size, blending, opacity = 1.0) => new THREE.PointsMaterial({
                    color: color,
                    map: this.particleTexture,
                    size: size,
                    transparent: true,
                    opacity: opacity,
                    blending: blending,
                    depthWrite: false,
                    sizeAttenuation: true
                });

                const W = 3.0, H_BODY = 2.0, H_LID = 0.5, D = 3.0, RIBBON_W = 0.6;
                const bodyGroup = new THREE.Group();
                const step = 0.05;
                const hw = W / 2, hd = D / 2;

                const isRibbonArea = (x, z) => Math.abs(x) < RIBBON_W / 2 || Math.abs(z) < RIBBON_W / 2;

                // ==========================================
                // PART A: 实体内胆
                // ==========================================
                const innerGeo = new THREE.BoxGeometry(W - 0.1, H_BODY - 0.1, D - 0.1);
                const innerMat = new THREE.MeshBasicMaterial({
                    color: bodyColor,
                    transparent: true,
                    opacity: 0.6,
                    side: THREE.DoubleSide,
                    depthWrite: true
                });
                const innerMesh = new THREE.Mesh(innerGeo, innerMat);
                innerMesh.position.y = H_BODY / 2;
                innerMesh.renderOrder = 0;
                bodyGroup.add(innerMesh);

                // ==========================================
                // PART B: 纯白高亮骨架
                // ==========================================
                const framePts = [];
                const addLine = (ptsArray, x1, y1, z1, x2, y2, z2) => {
                    const dist = Math.sqrt((x2 - x1) ** 2 + (y2 - y1) ** 2 + (z2 - z1) ** 2);
                    const count = Math.floor(dist / 0.06);
                    for (let i = 0; i <= count; i++) {
                        const t = i / count;
                        ptsArray.push(x1 + (x2 - x1) * t, y1 + (y2 - y1) * t, z1 + (z2 - z1) * t);
                    }
                };

                addLine(framePts, -hw, 0, -hd, hw, 0, -hd); addLine(framePts, hw, 0, -hd, hw, 0, hd);
                addLine(framePts, hw, 0, hd, -hw, 0, hd); addLine(framePts, -hw, 0, hd, -hw, 0, -hd);
                addLine(framePts, -hw, H_BODY, -hd, hw, H_BODY, -hd); addLine(framePts, hw, H_BODY, -hd, hw, H_BODY, hd);
                addLine(framePts, hw, H_BODY, hd, -hw, H_BODY, hd); addLine(framePts, -hw, H_BODY, hd, -hw, H_BODY, -hd);
                addLine(framePts, -hw, 0, -hd, -hw, H_BODY, -hd); addLine(framePts, hw, 0, -hd, hw, H_BODY, -hd);
                addLine(framePts, hw, 0, hd, hw, H_BODY, hd); addLine(framePts, -hw, 0, hd, -hw, H_BODY, hd);

                const frameMesh = new THREE.Points(
                    new THREE.BufferGeometry().setAttribute('position', new THREE.Float32BufferAttribute(framePts, 3)),
                    getParticleMat(0xFFFFFF, 0.14, THREE.AdditiveBlending, 1.0)
                );
                frameMesh.renderOrder = 2;
                bodyGroup.add(frameMesh);

                // ==========================================
                // PART C: 丝带粒子 (高密度)
                // ==========================================
                const ribbonPts = [];

                const generateRibbonOnly = () => {
                    for (let y = 0; y < H_BODY; y += step) {
                        const perimeter = [];
                        for (let x = -hw; x <= hw; x += step) if (Math.abs(x) < RIBBON_W / 2) perimeter.push([x, y, hd], [x, y, -hd]);
                        for (let z = -hd; z <= hd; z += step) if (Math.abs(z) < RIBBON_W / 2) perimeter.push([-hw, y, z], [hw, y, z]);

                        perimeter.forEach(pt => {
                            const [px, py, pz] = pt;
                            const jitter = 0.005; // 减少抖动，线条更规整
                            const fx = px + (Math.random() - 0.5) * jitter;
                            const fy = py + (Math.random() - 0.5) * jitter;
                            const fz = pz + (Math.random() - 0.5) * jitter;
                            ribbonPts.push(fx, fy, fz);
                        });
                    }
                    for (let x = -hw; x <= hw; x += step) {
                        for (let z = -hd; z <= hd; z += step) {
                            if (isRibbonArea(x, z)) ribbonPts.push(x, 0, z);
                        }
                    }
                };
                generateRibbonOnly();

                const ribbonMesh = new THREE.Points(
                    new THREE.BufferGeometry().setAttribute('position', new THREE.Float32BufferAttribute(ribbonPts, 3)),
                    getParticleMat(ribbonColor, 0.11, THREE.AdditiveBlending, 1.0)
                );
                ribbonMesh.renderOrder = 2;
                bodyGroup.add(ribbonMesh);
                group.add(bodyGroup);

                // ==========================================
                // PART D: 盒盖
                // ==========================================
                const lidGroup = new THREE.Group();
                lidGroup.position.y = H_BODY;

                const lidInnerGeo = new THREE.BoxGeometry(W + 0.1, H_LID, D + 0.1);
                const lidInnerMesh = new THREE.Mesh(lidInnerGeo, innerMat);
                lidInnerMesh.position.y = H_LID / 2;
                lidInnerMesh.renderOrder = 0;
                lidGroup.add(lidInnerMesh);

                const lidFramePts = [];
                const lw = W + 0.2, ld = D + 0.2;
                const lhw = lw / 2, lhd = ld / 2;

                addLine(lidFramePts, -lhw, H_LID, -lhd, lhw, H_LID, -lhd); addLine(lidFramePts, lhw, H_LID, -lhd, lhw, H_LID, lhd);
                addLine(lidFramePts, lhw, H_LID, lhd, -lhw, H_LID, lhd); addLine(lidFramePts, -lhw, H_LID, lhd, -lhw, H_LID, -lhd);
                addLine(lidFramePts, -lhw, 0, -lhd, lhw, 0, -lhd); addLine(lidFramePts, lhw, 0, -lhd, lhw, 0, lhd);
                addLine(lidFramePts, lhw, 0, lhd, -lhw, 0, lhd); addLine(lidFramePts, -lhw, 0, lhd, -lhw, 0, -lhd);
                addLine(lidFramePts, -lhw, 0, -lhd, -lhw, H_LID, -lhd); addLine(lidFramePts, lhw, 0, -lhd, lhw, H_LID, -lhd);
                addLine(lidFramePts, lhw, 0, lhd, lhw, H_LID, lhd); addLine(lidFramePts, -lhw, 0, lhd, -lhw, H_LID, lhd);

                const lidFrameMesh = new THREE.Points(
                    new THREE.BufferGeometry().setAttribute('position', new THREE.Float32BufferAttribute(lidFramePts, 3)),
                    getParticleMat(0xFFFFFF, 0.12, THREE.AdditiveBlending, 1.0)
                );
                lidFrameMesh.renderOrder = 2;
                lidGroup.add(lidFrameMesh);

                const lidRibbonPts = [];
                for (let x = -lhw; x <= lhw; x += step) {
                    for (let z = -lhd; z <= lhd; z += step) {
                        const fy = H_LID;
                        if (isRibbonArea(x, z)) lidRibbonPts.push(x, fy + 0.06, z);
                    }
                }
                for (let y = 0; y < H_LID; y += step) {
                    const perimeter = [];
                    for (let x = -lhw; x <= lhw; x += step) if (Math.abs(x) < RIBBON_W / 2) perimeter.push([x, y, lhd], [x, y, -lhd]);
                    for (let z = -lhd; z <= lhd; z += step) if (Math.abs(z) < RIBBON_W / 2) perimeter.push([-lhw, y, z], [lhw, y, z]);

                    perimeter.forEach(pt => {
                        const [px, py, pz] = pt;
                        const jitter = 0.005;
                        lidRibbonPts.push(px + (Math.random() - 0.5) * jitter, py + (Math.random() - 0.5) * jitter, pz + (Math.random() - 0.5) * jitter);
                    });
                }

                const lidRibbonMesh = new THREE.Points(
                    new THREE.BufferGeometry().setAttribute('position', new THREE.Float32BufferAttribute(lidRibbonPts, 3)),
                    getParticleMat(ribbonColor, 0.11, THREE.AdditiveBlending, 1.0)
                );
                lidRibbonMesh.renderOrder = 2;
                lidGroup.add(lidRibbonMesh);

                // ==========================================
                // PART E: 蝴蝶结
                // ==========================================
                const bowPts = [];
                const bowCount = 3500;
                for (let i = 0; i < bowCount; i++) {
                    const t = (i / bowCount) * Math.PI * 2;
                    const scale = 0.8;
                    const x = Math.sin(t) * (Math.exp(Math.cos(t)) - 2 * Math.cos(4 * t) - Math.pow(Math.sin(t / 12), 5)) * scale;
                    const z = Math.cos(t) * (Math.exp(Math.cos(t)) - 2 * Math.cos(4 * t) - Math.pow(Math.sin(t / 12), 5)) * scale;
                    const y = H_LID + 0.5 + Math.abs(Math.cos(t * 4)) * 0.3;
                    const spread = 0.05;
                    bowPts.push(x + (Math.random() - 0.5) * spread, y + (Math.random() - 0.5) * spread, z + (Math.random() - 0.5) * spread);
                }
                const bowMesh = new THREE.Points(
                    new THREE.BufferGeometry().setAttribute('position', new THREE.Float32BufferAttribute(bowPts, 3)),
                    getParticleMat(ribbonColor, 0.07, THREE.AdditiveBlending, 1.0)
                );
                bowMesh.renderOrder = 2;
                lidGroup.add(bowMesh);
                group.add(lidGroup);

                // ==========================================
                // PART F: 照片与位置
                // ==========================================
                const photoMat = isDefault
                    ? new THREE.MeshBasicMaterial({ color: bodyColor, transparent: true, opacity: 0.0 })
                    : new THREE.MeshBasicMaterial({ map: imgTexture, side: THREE.DoubleSide, transparent: true, opacity: 0.95 });

                const photoMesh = new THREE.Mesh(new THREE.PlaneGeometry(W - 0.4, D - 0.4), photoMat);
                photoMesh.rotation.x = -Math.PI / 2;
                photoMesh.position.y = H_BODY - 0.1;
                photoMesh.visible = false;
                photoMesh.renderOrder = 1;
                group.add(photoMesh);

                const dustGeo = new THREE.BufferGeometry();
                const dPos = [];
                for (let i = 0; i < 100; i++) dPos.push((Math.random() - 0.5) * W, Math.random() * H_BODY, (Math.random() - 0.5) * D);
                dustGeo.setAttribute('position', new THREE.Float32BufferAttribute(dPos, 3));
                const dustSystem = new THREE.Points(dustGeo, getParticleMat(ribbonColor, 0.08, THREE.AdditiveBlending));
                dustSystem.renderOrder = 2;
                group.add(dustSystem);

                let f;
                let tiltX = 0;
                let tiltZ = 0;
                let yaw = 0;
                if (this.currentState === STATE.TREE) {
                    const groundY = -CONFIG.treeHeight / 2 + 1.2;
                    const baseRadius = CONFIG.treeBaseRadius + 5;

                            box.userData.particles.visible = false;
                        };
                        gsap.to(box.userData.particles.material, {

                    gsap.to(box.rotation, { x: tilt.x, y: tilt.y ?? box.rotation.y, z: tilt.z, duration: 2.5, overwrite: "auto" });
