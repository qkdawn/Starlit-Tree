                    let offset = i - centerIndex;
                    if (offset > total / 2) offset -= total;
                    if (offset < -total / 2) offset += total;

                    let tPos, tRot, tScale;

                    if (offset === 0) {
                        tPos = { x: 0, y: -2, z: 15 };
                        tRot = { x: 0.2, y: 0, z: 0 };
                        tScale = 1.5;

                        if (!box.userData.isOpen) {
                            this.killGiftOpenCloseTweens(box);
                            gsap.to(box.userData.lid.position, { y: 3.5, z: -1.5, duration: 1.5, ease: "power2.out", overwrite: "auto" });
                            gsap.to(box.userData.lid.rotation, { x: -Math.PI / 4, duration: 1.5, ease: "power2.out", overwrite: "auto" });

                            box.userData.photo.visible = true;
                            box.userData.photo.rotation.x = -Math.PI / 2;
                            box.userData.photo.position.y = 1.8;

                            gsap.to(box.userData.photo.rotation, { x: 0, duration: 1.5, ease: "back.out(1.2)", delay: 0.2, overwrite: "auto" });
                            gsap.to(box.userData.photo.position, { y: 3.0, duration: 1.5, ease: "power2.out", delay: 0.2, overwrite: "auto" });

                            if (box.userData.particles) {
                                box.userData.particles.visible = true;
                                box.userData.particles.position.y = 0;
                                gsap.to(box.userData.particles.material, { opacity: 0.8, duration: 1, overwrite: "auto" });
                                gsap.to(box.userData.particles.position, { y: 2, duration: 3, overwrite: "auto" });
                                gsap.to(box.userData.particles.scale, { x: 1.5, y: 1.5, z: 1.5, duration: 3, overwrite: "auto" });
                            }

                            box.userData.isOpen = true;
                        }
                    } else {
                        if (box.userData.isOpen) {
                            this.killGiftOpenCloseTweens(box);
                            gsap.to(box.userData.lid.position, { y: 2.0, z: 0, duration: 0.8, ease: "power2.inOut", overwrite: "auto" });
                            gsap.to(box.userData.lid.rotation, { x: 0, duration: 0.8, ease: "power2.inOut", overwrite: "auto" });

                            const hidePhoto = () => {
                                box.userData.photo.visible = false;
                            };
                            gsap.to(box.userData.photo.position, {
                                y: 1.8,
                                duration: 0.6,
                                overwrite: "auto",
                                onComplete: hidePhoto,
                                onInterrupt: hidePhoto
                            });
                            gsap.to(box.userData.photo.rotation, { x: -Math.PI / 2, duration: 0.6, overwrite: "auto" });

                            if (box.userData.particles) {
                                const hideParticles = () => {
                                    box.userData.particles.visible = false;
                                };
                                gsap.to(box.userData.particles.material, {
                                    opacity: 0,
                                    duration: 0.5,
                                    overwrite: "auto",
                                    onComplete: hideParticles,
                                    onInterrupt: hideParticles
                                });
                            }

                            box.userData.isOpen = false;
                        }

                        const angle = offset * 0.3;
                        const radius = 18;
                        tPos = {
                            x: Math.sin(angle) * radius,
                            y: -2,
                            z: Math.cos(angle) * radius - 5
                        };
                        tRot = { x: 0, y: angle, z: 0 };
                        tScale = 1.0;
                    }

                    gsap.to(box.position, { ...tPos, duration: 1.2, ease: "power3.out", overwrite: "auto" });
                    gsap.to(box.rotation, { ...tRot, duration: 1.2, ease: "power3.out", overwrite: "auto" });
                    gsap.to(box.scale, { x: tScale, y: tScale, z: tScale, duration: 1.2, ease: "power3.out", overwrite: "auto" });
                });
            }

            setupGalleryControls() {
                window.addEventListener('keydown', (e) => {
                    if (e.code === 'Space') this.toggleState();
                    if (this.currentState !== STATE.GALLERY) return;
                    if (e.key === 'ArrowLeft') this.navigateGallery(-1); if (e.key === 'ArrowRight') this.navigateGallery(1); if (e.key === 'Escape') this.switchState(STATE.TREE);
                });
            }

            updateWASD(dt) {
                if (!this.controls || !this.camera) return;
                if (!this.keysDown?.size) return;

                const forward = new THREE.Vector3();
                this.camera.getWorldDirection(forward);
                forward.y = 0;
                if (forward.lengthSq() < 1e-6) return;
                forward.normalize();

                const right = new THREE.Vector3().crossVectors(forward, this.camera.up).normalize();

                let moveX = 0, moveZ = 0;
                if (this.keysDown.has('w')) moveZ += 1;
                if (this.keysDown.has('s')) moveZ -= 1;
                if (this.keysDown.has('d')) moveX += 1;
                if (this.keysDown.has('a')) moveX -= 1;
                let moveY = 0;
                if (this.keysDown.has('e') || this.keysDown.has('r')) moveY += 1;
                if (this.keysDown.has('q') || this.keysDown.has('f')) moveY -= 1;
                if (moveX === 0 && moveZ === 0 && moveY === 0) return;

                const boost = this.keysDown.has('shift') ? 2.2 : 1.0;
                const speed = 14.0 * boost;
                const delta = new THREE.Vector3();
                delta.addScaledVector(forward, moveZ);
                delta.addScaledVector(right, moveX);
                delta.y += moveY;
                if (delta.lengthSq() < 1e-6) return;
                delta.normalize().multiplyScalar(speed * dt);

                this.camera.position.add(delta);
                this.controls.target.add(delta);
                this.controls.autoRotate = this.userMovedCamera ? false : this.controls.autoRotate;
            }

            setupStarInteraction() {
                if (!this.raycaster) this.raycaster = new THREE.Raycaster();
                if (!this.mouse) this.mouse = new THREE.Vector2();
                this.raycaster.params.Points = this.raycaster.params.Points || {};
                this.raycaster.params.Points.threshold = 0.45;

                this._starClickPlane = this._starClickPlane || new THREE.Plane();
                this._starClickSphere = this._starClickSphere || new THREE.Sphere();
                this._starTmpV3A = this._starTmpV3A || new THREE.Vector3();
                this._starTmpV3B = this._starTmpV3B || new THREE.Vector3();
                this._starTmpV3C = this._starTmpV3C || new THREE.Vector3();
                this._starTmpV3D = this._starTmpV3D || new THREE.Vector3();

                window.addEventListener('click', (event) => {
                    if (this.currentState !== STATE.TREE || !this.starHitBox) return;
                    if (event.target?.closest?.('#controls, .gallery-nav')) return;

                    this.mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
                    this.mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
                    this.raycaster.setFromCamera(this.mouse, this.camera);

                    // Area nudge (stable): use 2D distance to the projected star center.
                    if (this.starPoints && this.particleStarGroup) {
                        const t = this.starState?.progress ?? 0;
                        if (t > 0.5) {
                            const center = this.particleStarGroup.getWorldPosition(this._starTmpV3A);
                            const ndc = this._starTmpV3D.copy(center).project(this.camera);
                            const sx = (ndc.x * 0.5 + 0.5) * window.innerWidth;
                            const sy = (-ndc.y * 0.5 + 0.5) * window.innerHeight;
                            const dx = event.clientX - sx;
                            const dy = event.clientY - sy;
                            const dist = Math.hypot(dx, dy);
                            const radiusPx = THREE.MathUtils.lerp(90, 320, t);

                            if (dist <= radiusPx) {
                                const planeNormal = this.camera.getWorldDirection(this._starTmpV3C);
                                this._starClickPlane.setFromNormalAndCoplanarPoint(planeNormal, center);
                                const worldHit = this._starTmpV3B;
                                const hitPlane = this.raycaster.ray.intersectPlane(this._starClickPlane, worldHit);
                                if (hitPlane) this.nudgeStarParticles(worldHit);
                            }
                        }
                    }

                    const hitIntersects = this.raycaster.intersectObject(this.starHitBox);
                    if (hitIntersects.length > 0) {
                        this.toggleStar();
                    }
                });
            }

            toggleStar() {
                if (!this.starPoints || !this.starState) return;

                gsap.killTweensOf(this.starState);
                if (this.starLight) gsap.killTweensOf(this.starLight);
                if (this.starPoints?.material) gsap.killTweensOf(this.starPoints.material);

                const targetValue = this.starState.progress < 0.5 ? 1 : 0;
                const duration = targetValue === 1 ? 2.5 : 1.8;
                const ease = targetValue === 1 ? "power4.out" : "power2.inOut";

                const geom = this.starPoints.geometry;
                const basePos = geom.userData.basePos || (geom.userData.basePos = geom.attributes.position.array.slice());
                const initialPos = geom.userData.initialPos;
                const targetPos = geom.userData.targetPos;
                const count = geom.attributes.position.count;

                gsap.to(this.starState, {
                    progress: targetValue,
                    duration,
                    ease,
                    onUpdate: () => {
                        const t = this.starState.progress;
                        for (let i = 0; i < count; i++) {
                            const i3 = i * 3;
                            basePos[i3] = THREE.MathUtils.lerp(initialPos[i3], targetPos[i3], t);
                            basePos[i3 + 1] = THREE.MathUtils.lerp(initialPos[i3 + 1], targetPos[i3 + 1], t);
                            basePos[i3 + 2] = THREE.MathUtils.lerp(initialPos[i3 + 2], targetPos[i3 + 2], t);
                        }
                    },
                    onStart: () => {
                        // Only reset offsets when *re-forming* the star; otherwise clicks would cancel displacement.
                        if (targetValue === 0) {
                            if (this.starParticleMotion) {
                                this.starParticleMotion.off.fill(0);
                                this.starParticleMotion.vel.fill(0);
                            }
                            this.starTrailStrength = 0;
                            if (this.starTrails?.length) {
                                for (const trail of this.starTrails) {
                                    if (trail?.material) trail.material.opacity = 0;
                                }
                            }
                        }

                        // Click pulse (brighten briefly), independent of scatter/toggle state.
                        if (this.starLight) {
                            gsap.fromTo(this.starLight, { intensity: 3.2 }, { intensity: 0.6, duration: 0.55, ease: "power2.out", overwrite: "auto" });
                        }
                        if (this.starPoints?.material) {
                            gsap.fromTo(this.starPoints.material, { opacity: 0.95 }, { opacity: 0.65, duration: 0.55, ease: "power2.out", overwrite: "auto" });
                        }
                    }
                });
            }

            nudgeStarParticles(hit) {
                if (!this.starPoints?.geometry?.attributes?.position || !this.starParticleMotion) return;

                const geom = this.starPoints.geometry;
                const vel = this.starParticleMotion.vel;
                const off = this.starParticleMotion.off;
                const basePos = geom.userData.basePos || geom.userData.initialPos;

                const worldPoint = hit?.isVector3 ? hit : hit?.point;
                if (!worldPoint) return;
                this._starTmpLocalHit = this._starTmpLocalHit || new THREE.Vector3();
                const localHit = this.starPoints.worldToLocal(this._starTmpLocalHit.copy(worldPoint));
                const t = this.starState?.progress ?? 0;
                const influence = THREE.MathUtils.lerp(6.5, 18.0, t);
                const influence2 = influence * influence;
                const strength = THREE.MathUtils.lerp(1.65, 1.0, t);

                for (let i = 0; i < geom.attributes.position.count; i++) {
                    const i3 = i * 3;
                    const px = basePos[i3] + off[i3];
                    const py = basePos[i3 + 1] + off[i3 + 1];
                    const pz = basePos[i3 + 2] + off[i3 + 2];
                    const dx = px - localHit.x;
                    const dy = py - localHit.y;
                    const dz = pz - localHit.z;
                    const d2 = dx * dx + dy * dy + dz * dz;
                    if (d2 > influence2) continue;

                    const d = Math.sqrt(d2) + 1e-4;
                    const falloff = 1 - d / influence;
                    const push = strength * falloff * falloff * (0.85 + Math.random() * 0.35);
                    const nx = dx / d, ny = dy / d, nz = dz / d;
                    const swirl = THREE.MathUtils.lerp(0.16, 0.12, t) * falloff * (Math.random() * 2 - 1);

                    // Immediate displacement so it reads as "moved away", not just micro-jitter.
                    const kick = push * 1.8;
                    off[i3] += nx * kick;
                    off[i3 + 1] += ny * kick;
                    off[i3 + 2] += nz * kick;

                    vel[i3] += nx * push + (-ny) * swirl;
                    vel[i3 + 1] += ny * push + (nx) * swirl;
                    vel[i3 + 2] += nz * push + (Math.random() * 2 - 1) * 0.08 * falloff;
                }

                this.starTrailStrength = 1;
            }

            updateStarParticleMotion() {
                if (!this.starPoints?.geometry?.attributes?.position || !this.starParticleMotion) return;

                const geom = this.starPoints.geometry;
                const basePos = geom.userData.basePos || geom.userData.initialPos;
                const pos = geom.attributes.position.array;
                const off = this.starParticleMotion.off;
                const vel = this.starParticleMotion.vel;

                const t = this.starState?.progress ?? 0;
                // No "return": keep displaced positions; only damp velocity over time.
                const velDamping = THREE.MathUtils.lerp(0.965, 0.987, t);
                const maxOffset = THREE.MathUtils.lerp(18.0, 60.0, t);
                const maxOffset2 = maxOffset * maxOffset;

                for (let i = 0; i < geom.attributes.position.count; i++) {
                    const i3 = i * 3;

                    off[i3] += vel[i3];
                    off[i3 + 1] += vel[i3 + 1];
                    off[i3 + 2] += vel[i3 + 2];

                    vel[i3] *= velDamping;
                    vel[i3 + 1] *= velDamping;
                    vel[i3 + 2] *= velDamping;

                    const o2 = off[i3] * off[i3] + off[i3 + 1] * off[i3 + 1] + off[i3 + 2] * off[i3 + 2];
                    if (o2 > maxOffset2) {
                        const s = maxOffset / (Math.sqrt(o2) + 1e-6);
                        off[i3] *= s; off[i3 + 1] *= s; off[i3 + 2] *= s;
                        vel[i3] *= 0.35; vel[i3 + 1] *= 0.35; vel[i3 + 2] *= 0.35;
                    }

                    pos[i3] = basePos[i3] + off[i3];
                    pos[i3 + 1] = basePos[i3 + 1] + off[i3 + 1];
                    pos[i3 + 2] = basePos[i3 + 2] + off[i3 + 2];
                }

                geom.attributes.position.needsUpdate = true;

                if (this.starTrailHistory?.length && this.starTrails?.length) {
                    for (let i = this.starTrailHistory.length - 1; i > 0; i--) {
                        this.starTrailHistory[i].set(this.starTrailHistory[i - 1]);
                    }
                    this.starTrailHistory[0].set(pos);

                    const trailStrength = this.starTrailStrength ?? 0;

                    for (let i = 0; i < this.starTrails.length; i++) {
                        const trail = this.starTrails[i];
                        const hist = this.starTrailHistory[i + 1];
                        if (!trail?.geometry?.attributes?.position || !hist) continue;

                        trail.geometry.attributes.position.array.set(hist);
                        trail.geometry.attributes.position.needsUpdate = true;
                        trail.material.opacity = (this.starTrailOpacities?.[i] ?? 0.1) * trailStrength;
                    }

                    // Slow fade so the tail is actually visible.
                    this.starTrailStrength = Math.max(0, trailStrength * 0.965);
                }
            }

            async toggleCamera() {
                if (this.cameraActive) return;
                try {
                    const video = document.getElementById('input-video');
                    const stream = await navigator.mediaDevices.getUserMedia({ video: { width: 640, height: 480 } });
                    video.srcObject = stream; video.play();
                    this.cameraActive = true;
                    this.setupMediaPipe(video);
                    this.updateHUD("HANDS READY!", "👌");
                } catch (err) { alert("Check localhost environment."); }
            }

            setupMediaPipe(video) {
                const hands = new window.Hands({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}` });
                hands.setOptions({ maxNumHands: 1, modelComplexity: 0 });

                this.cursorSmoothPos = new THREE.Vector3();

                hands.onResults((results) => {
                    const navLeft = document.getElementById('nav-left');
                    const navRight = document.getElementById('nav-right');

                    navLeft.classList.remove('charging');
                    navRight.classList.remove('charging');

                    if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                        const lm = results.multiHandLandmarks[0];

                        // 手势（捏合）在所有模式都生效；但“手部圈圈光标”只在 TREE 模式绘制
                        const thumb = lm[4];
                        const index = lm[8];
                        if (Math.sqrt(Math.pow(thumb.x - index.x, 2) + Math.pow(thumb.y - index.y, 2)) < 0.05) {
                            const now = Date.now();
                            if (now - this.lastToggleTime > this.toggleCooldown) {
                                this.toggleState();
                                this.lastToggleTime = now;
                                const flash = new THREE.PointLight(0xffffff, 2, 5);
                                flash.position.copy(this.cursor.position);
                                this.scene.add(flash);
                                setTimeout(() => this.scene.remove(flash), 200);
                            }
                        }

                        if (this.currentState !== STATE.TREE) {
                            this.currentCharge = 0;
                            this.hoveringEdge = null;
                            this.updateChargeState(navLeft, navRight);
                            this.cursor.visible = false;
                            return;
                        }

                        const x = (1 - lm[9].x) * 2 - 1;
                        const y = -(lm[9].y * 2 - 1);
                        const vec = new THREE.Vector3(x, y, 0.5).unproject(this.camera);
                        const dir = vec.sub(this.camera.position).normalize();
                        const dist = this.currentState === STATE.GALLERY ? 20 : 40;
                        const rawTarget = this.camera.position.clone().add(dir.multiplyScalar(dist));

                        if (this.cursorSmoothPos.lengthSq() === 0) this.cursorSmoothPos.copy(rawTarget);
                        this.cursorSmoothPos.lerp(rawTarget, 0.2);

                        gsap.to(this.cursor.position, {
                            x: this.cursorSmoothPos.x, y: this.cursorSmoothPos.y, z: this.cursorSmoothPos.z, duration: 0.1
                        });
                        this.cursor.visible = true;
                        this.cursor.rotation.x += 0.05;
                        this.cursor.rotation.y += 0.05;

                        if (this.currentState === STATE.GALLERY && !this.isNavigating) {
                            const threshold = 10;
                            const chargeSpeed = 0.02;
                            const decaySpeed = 0.03;

                            const cursorX = this.cursorSmoothPos.x;
                            let isHoveringNow = false;
                            let targetEdge = null;

                            if (cursorX < -threshold) {
                                isHoveringNow = true;
                                targetEdge = 'left';
                            } else if (cursorX > threshold) {
                                isHoveringNow = true;
                                targetEdge = 'right';
                            }

                            if (isHoveringNow) {
                                if (this.hoveringEdge && this.hoveringEdge !== targetEdge) {
                                    this.currentCharge = 0;
                                }
                                this.hoveringEdge = targetEdge;
                                this.currentCharge += chargeSpeed;

                                if (targetEdge === 'left') navLeft.classList.add('charging');
                                else navRight.classList.add('charging');

                            } else {
                                this.currentCharge -= decaySpeed;
                            }
                            this.updateChargeState(navLeft, navRight);
                        }
                    } else {
                        if (this.currentCharge > 0.85 && this.hoveringEdge && !this.isNavigating) {
                            this.currentCharge = 1.0;
                            this.updateChargeState(navLeft, navRight);
                        } else {
                            this.currentCharge -= 0.05;
                            this.updateChargeState(navLeft, navRight);

                            if (this.currentCharge <= 0) {
                                this.cursor.visible = false;
                                this.hoveringEdge = null;
                            }
                        }
                    }
                });
                const loop = async () => { await hands.send({ image: video }); requestAnimationFrame(loop); }; loop();
            }

            updateChargeState(navLeft, navRight) {
                this.currentCharge = Math.max(0, Math.min(1, this.currentCharge));
                if (this.currentCharge === 0) {
                    this.hoveringEdge = null;
                }

                this.chargeRing.material.opacity = this.currentCharge;
                const scale = 0.1 + this.currentCharge * 2.4;
                this.chargeRing.scale.set(scale, scale, 1);
                this.chargeRing.rotation.z -= (0.1 + this.currentCharge * 0.3);

                if (this.currentCharge >= 1.0) {
                    this.triggerNavigation(navLeft, navRight);
                }
            }

            triggerNavigation(navLeft, navRight) {
                this.isNavigating = true;

                const activeNav = this.hoveringEdge === 'left' ? navLeft : navRight;
                activeNav.classList.add('active');

                if (this.hoveringEdge === 'left') this.navigateGallery(-1);
                else this.navigateGallery(1);

                const flash = new THREE.PointLight(0xffd700, 3, 5);
                flash.position.copy(this.cursor.position);
                this.scene.add(flash);

                setTimeout(() => {
                    this.scene.remove(flash);
                    this.isNavigating = false;
                    activeNav.classList.remove('active');
                }, 1000);

                this.currentCharge = 0;
                this.hoveringEdge = null;
            }

            animate() {
                requestAnimationFrame(this.animate.bind(this));
                const now = performance.now();
                const dt = Math.min(0.05, Math.max(0.001, (now - this._lastFrameTime) / 1000));
                this._lastFrameTime = now;
                this.time += 0.01;

                this.updateButterflies();
                this.updateWASD(dt);

                const dummy = new THREE.Object3D();
                this.pData.forEach((p) => {
                    if (p.type === 'snow') return;
                    dummy.position.set(p.current.x, p.current.y + Math.sin(this.time + p.index) * 0.1, p.current.z);
                    dummy.rotation.set(this.time * p.speed * 10, this.time * p.speed * 5, 0);
                    if (p.type === 'ornament') {
                        const brightness = 1 + Math.sin(this.time * 3 + p.index) * p.brightness * 0.5;
                        dummy.scale.set(brightness, brightness, brightness);
                    }
                    dummy.updateMatrix();
                    p.mesh.setMatrixAt(p.index, dummy.matrix);
                });
                this.needleMesh.instanceMatrix.needsUpdate = true;
                this.ornMesh.instanceMatrix.needsUpdate = true;
                const snowPos = this.snowPoints.geometry.attributes.position.array;
                for (let i = 0; i < CONFIG.snowCount; i++) {
                    snowPos[i * 3 + 1] -= this.pData[CONFIG.needleCount + CONFIG.butterflyCount + i]?.speed || 0.05;
                    if (snowPos[i * 3 + 1] < -CONFIG.treeHeight / 2 - 10) snowPos[i * 3 + 1] = CONFIG.treeHeight / 2 + 20;
                }
                this.snowPoints.geometry.attributes.position.needsUpdate = true;
                if (this.deerGroup.visible) {
                    this.deerGroup.position.y = -CONFIG.treeHeight / 2 + 0.5 + Math.sin(this.time * 0.8) * 0.3;
                    const positions = this.deerPointMesh.geometry.attributes.position.array;
                    for (let i = 0; i < this.deerPoints.length; i++) {
                        const p = this.deerPoints[i];
                        const flow = Math.sin(this.time * 2 + p.flowOffset) * 0.15;
                        positions[i * 3] = p.base.x + flow;
                        positions[i * 3 + 1] = p.base.y + flow;
                        positions[i * 3 + 2] = p.base.z + flow;
                    }
                    this.deerPointMesh.geometry.attributes.position.needsUpdate = true;
                    this.deerLight.position.copy(this.deerGroup.position).add(new THREE.Vector3(0, 5, 2));
                }
                if (this.dogGroup?.visible && this.dogPointMesh && this.dogPoints?.length) {
                    const positions = this.dogPointMesh.geometry.attributes.position.array;
                    for (let i = 0; i < this.dogPoints.length; i++) {
                        const p = this.dogPoints[i];
                        const flow = Math.sin(this.time * 2.1 + p.flowOffset) * 0.08;
                        positions[i * 3] = p.base.x + flow;
                        positions[i * 3 + 1] = p.base.y + flow * 0.6;
                        positions[i * 3 + 2] = p.base.z + flow;
                    }
                    this.dogPointMesh.geometry.attributes.position.needsUpdate = true;
                }

                // --- Particle Star Animation ---
                if (this.particleStarGroup) {
                    const rotateSpeed = this.starState?.progress > 0.5 ? 0.001 : 0.005;
                    this.particleStarGroup.rotation.y += rotateSpeed;

                    const floatAmp = (1 - (this.starState?.progress ?? 0)) * 0.3;
                    this.particleStarGroup.position.y = CONFIG.treeHeight / 2 + 1.8 + Math.sin(this.time * 0.5) * floatAmp;

                    if (this.starPoints) {
                        this.updateStarParticleMotion();
                        const geom = this.starPoints.geometry;
                        const colors = geom.attributes.color.array;
                        const baseColors = geom.userData.baseColor;
                        const offset = Math.floor(this.time * 10) % 10;
                        for (let i = offset; i < geom.attributes.color.count; i += 10) {
                            const i3 = i * 3;
                            const base = 0.75 + Math.random() * 0.6;
                            const dim = 1 - (this.starState?.progress ?? 0) * 0.35;
                            const factor = base * dim;
                            colors[i3] = baseColors[i3] * factor;
                            colors[i3 + 1] = baseColors[i3 + 1] * factor;
                            colors[i3 + 2] = baseColors[i3 + 2] * factor;
                        }
                        geom.attributes.color.needsUpdate = true;
                    }
                }

                this.controls.update();



                this.giftBoxes.forEach((box, i) => {
                    box.position.y += Math.sin(this.time * 1.5 + i) * 0.003;
                    if (box.userData.ribbon) {
                        box.userData.ribbon.material.opacity = 0.8 + Math.sin(this.time * 3 + i) * 0.2;
                    }
                });

                this.composer.render();
            }
        }

        window.app = new DeerAppV16();
    </script>
</body>
